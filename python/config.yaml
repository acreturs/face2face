# =============================================================================
# Generated by Claude (Anthropic Claude Code) on 2026-06-12.
# Central configuration. No paths hardcoded in source -> portable across machines.
# Used by the Python proof-of-concept (python/main.py); the C++ side reads it
# once you wire up yaml-cpp.
# =============================================================================

bfm:
  model_path: data/bfm/model2017-1_bfm_nomouth.h5

dataset:
  root: data/pandora/base_1_ID01
  frame_index: 0
  modality: rgbd          # rgb | rgbd  (PoC uses rgbd: it fits to the depth cloud)

  # Depth-camera intrinsics, DERIVED from this dataset's 2D<->3D joint pairs
  # (reprojection error < 0.1 px). See README "Dataset" section.
  intrinsics:
    fx: 367.28
    fy: 368.35
    cx: 256.66
    cy: 210.05

fit:
  n_iters: 30             # ICP outer iterations -> "predict params in N iterations"
  n_shape_coeffs: 30      # number of BFM identity (alpha) PCA coefficients to solve for
                          # NOTE: must be > 0 — 0 leaves the shape basis empty and the
                          # Fitter crashes on reshape (ValueError: ... size 0 into (3,0)).
  regularization: 15.0    # weight pulling alpha toward 0 (the PCA mean) -> E_reg
                          # (in mm^2 units ~ depth-noise^2; larger = smoother/closer to mean)
  sparse_landmark_weight: 100.0
  use_dense: false
  trim_percentile: 80
  maximum_target_points: 2500


output:
  dir: data/out
